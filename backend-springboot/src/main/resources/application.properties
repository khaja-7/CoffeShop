# ============================================================
# Coffee Shop API - Spring Boot Application Properties
# Supabase PostgreSQL Configuration
# ============================================================

spring.application.name=coffee-shop-api
server.port=5000

# ── Supabase PostgreSQL Connection (using IPv4 Pooler) ─────────────────────────
spring.datasource.url=jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:6543/postgres?prepareThreshold=0
spring.datasource.username=postgres.xadkmyuwnnzzznaavrkx
spring.datasource.password=CoffeeShopOnline@
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1

# ── JPA / Hibernate ─────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── JWT Configuration ─────────────────────────────────────
app.jwt.secret=coffee_shop_super_secret_key_2026_extended_for_hs256_security_production
app.jwt.expiration-ms=604800000

# ── CORS ────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://localhost:4173

# ── Actuator ────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
info.app.name=Coffee Shop API
info.app.version=1.0.0
info.app.description=Production-ready Coffee Shop REST API

# ── Logging ─────────────────────────────────────────────────
logging.level.com.coffeeshop=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
